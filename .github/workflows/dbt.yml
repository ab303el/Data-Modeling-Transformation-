name: dbt CI/CD Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt_run:
    name: Run and Test dbt Models
    runs-on: ubuntu-latest

    # Correct way to access the secret context object
    env:
      DBT_ENV_SECRET_HOST: ${{ secrets.DB_HOST }}
      DBT_ENV_SECRET_USER: ${{ secrets.DB_USER }}
      DBT_ENV_SECRET_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DBT_ENV_SECRET_PORT: 5432
      DBT_ENV_SECRET_DBNAME: ${{ secrets.DB_NAME }}
      DBT_ENV_SECRET_SCHEMA: ${{ secrets.DB_SCHEMA }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FIXED: Changed with-python to setup-python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-postgres

      - name: Install dbt Packages
        run: dbt deps

        # NEW STEP: Generates the missing profile directory and target connection file
      - name: Provision dbt Profile
        run: |
          mkdir -p ~/.dbt
          echo "my_company:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: postgres" >> ~/.dbt/profiles.yml
          echo "      host: '${{ secrets.DB_HOST }}'" >> ~/.dbt/profiles.yml
          echo "      user: '${{ secrets.DB_USER }}'" >> ~/.dbt/profiles.yml
          echo "      password: '${{ secrets.DB_PASSWORD }}'" >> ~/.dbt/profiles.yml
          echo "      port: ${{ secrets.DB_PORT || 5432 }}" >> ~/.dbt/profiles.yml
          echo "      dbname: '${{ secrets.DB_NAME }}'" >> ~/.dbt/profiles.yml
          echo "      schema: '${{ secrets.DB_SCHEMA }}'" >> ~/.dbt/profiles.yml
          echo "      threads: 1" >> ~/.dbt/profiles.yml



      - name: Verify Connection (Debug)
        run: dbt debug --target dev

      - name: Build and Test Models
        run: dbt build --target dev
