name: dbt CI/CD Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt_run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # These environment variables are available to all steps
    env:
          DBT_ENV_SECRET_HOST: '127.0.0.1'
          DBT_ENV_SECRET_USER: 'ab303el'
          DBT_ENV_SECRET_PASSWORD: 'ABEL'
          DBT_ENV_SECRET_PORT: 5432
          DBT_ENV_SECRET_DBNAME: 'my_company'
          DBT_ENV_SECRET_SCHEMA: 'employees'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-postgres

      - name: Install dbt Packages
        run: dbt deps
      - name: Provision dbt Profile
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          my_company:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ env.DB_HOST }}
                user: ${{ env.DB_USER }}
                password: ${{ env.DB_PASSWORD }}
                port: 5432  # Hardcode this here for CI since the service is on 5432
                dbname: ${{ env.DB_NAME }}
                schema: ${{ env.DB_SCHEMA }}
                threads: 1
          EOF

      - name: Verify Connection (Debug)
        run: dbt debug --target dev

      - name: Build and Test Models
        run: dbt build --target dev