name: dbt CI/CD Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt_run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: '127.0.0.1'
      DB_USER: 'test_user'
      DB_PASSWORD: 'test_password'
      DB_PORT: '5432'
      DB_NAME: 'test_db'
      DB_SCHEMA: 'public'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5  # FIXED: Changed from with-python to setup-python
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-postgres

      - name: Install dbt Packages
        run: dbt deps

      - name: Provision dbt Profile
        run: |
          mkdir -p ~/.dbt
          echo "my_company:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: postgres" >> ~/.dbt/profiles.yml
          # FIXED: Swapped out ${{ env.xxx }} syntax for proper bash variable references
          echo "      host: '$DB_HOST'" >> ~/.dbt/profiles.yml
          echo "      user: '$DB_USER'" >> ~/.dbt/profiles.yml
          echo "      password: '$DB_PASSWORD'" >> ~/.dbt/profiles.yml
          echo "      port: $DB_PORT" >> ~/.dbt/profiles.yml
          echo "      dbname: '$DB_NAME'" >> ~/.dbt/profiles.yml
          echo "      schema: '$DB_SCHEMA'" >> ~/.dbt/profiles.yml
          echo "      threads: 1" >> ~/.dbt/profiles.yml

      - name: Verify Connection (Debug)
        run: dbt debug --target dev

      - name: Build and Test Models
        run: dbt build --target dev
